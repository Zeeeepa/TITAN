name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build backend
        run: npm run build

      - name: Build UI
        run: npm run build:ui

      - name: Run tests
        # --pool=forks isolates each test file in its own process so memory
        # never accumulates across the full suite — addresses the long-
        # standing "Vitest worker OOM flake on full suite" CLAUDE.md
        # called out and that bit every Dependabot CI run since 2026-04-26.
        # Heap size raised from 4096 → 6144 MB to match the rest of the
        # workflow so we can't OOM mid-run on large test files either.
        run: npx vitest run --reporter=verbose --pool=forks
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  health:
    needs: test
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Version consistency check (all 5 files must match)
        run: |
          PKG_VER=$(node -e "console.log(require('./package.json').version)")
          CONST_VER=$(grep -oP "TITAN_VERSION\s*=\s*'(\K[^']+)" src/utils/constants.ts || echo "NOT_FOUND")
          CORE_TEST_VER=$(grep -oP "toBe\('(\K\d+\.\d+\.\d+)" tests/core.test.ts | head -1 || echo "NOT_FOUND")
          MC_TEST_COUNT=$(grep -c "$PKG_VER" tests/mission-control.test.ts || echo "0")
          CHANGELOG_VER=$(grep -oP "^## \[?(\K\d+\.\d+\.\d+)" CHANGELOG.md | head -1 || echo "NOT_FOUND")

          echo "package.json:              $PKG_VER"
          echo "constants.ts:              $CONST_VER"
          echo "core.test.ts:              $CORE_TEST_VER"
          echo "mission-control.test.ts:   $MC_TEST_COUNT occurrences"
          echo "CHANGELOG.md:              $CHANGELOG_VER"

          FAIL=0
          if [ "$CONST_VER" != "$PKG_VER" ]; then
            echo "::error::constants.ts version ($CONST_VER) does not match package.json ($PKG_VER)"
            FAIL=1
          fi
          if [ "$CORE_TEST_VER" != "$PKG_VER" ]; then
            echo "::error::core.test.ts version ($CORE_TEST_VER) does not match package.json ($PKG_VER)"
            FAIL=1
          fi
          if [ "$MC_TEST_COUNT" -lt 4 ]; then
            echo "::error::mission-control.test.ts has only $MC_TEST_COUNT occurrences of $PKG_VER (need 4)"
            FAIL=1
          fi
          if [ "$CHANGELOG_VER" != "$PKG_VER" ]; then
            echo "::error::CHANGELOG.md latest version ($CHANGELOG_VER) does not match package.json ($PKG_VER)"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "All 5 version locations match: $PKG_VER"

      - name: npm publish dry-run
        run: npm publish --dry-run 2>&1

      - name: Docker build smoke test
        run: docker build --target deps -t titan-deps-test . 2>&1 | tail -5
