version: '3.8'

services:
  titan:
    build: .
    container_name: titan-gateway
    ports:
      - "18789:18789"
    volumes:
      - titan-data:/home/titan/.titan
    environment:
      - NODE_ENV=production
      - TITAN_HOME=/home/titan/.titan
      # Uncomment and set your API keys:
      # - ANTHROPIC_API_KEY=your-api-key
      # - OPENAI_API_KEY=your-api-key
      # - GOOGLE_API_KEY=your-api-key
      # - DISCORD_TOKEN=your-discord-token
      # - TELEGRAM_TOKEN=your-telegram-token
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:18789/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  titan-data:
    driver: local
