version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    reviewers:
      - "Djtony707"
    labels:
      - "dependencies"
    groups:
      production-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "@typescript-eslint/*"
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "@eslint/*"
      dev-deps:
        # Keep peer-dep families together so Dependabot bumps them in lockstep.
        # Pre-fix history (2026-04-27): "vitest" in dev-deps + "@vitest/coverage-v8"
        # falling through to production-deps caused a split bump (vitest@2.1.9 +
        # coverage-v8@4.1.5) that broke `npm ci` with ERESOLVE. Every Dependabot
        # PR after that failed CI. The "@vitest/*" pattern below pulls every
        # @vitest scoped package into the same group as `vitest` itself, so
        # they stay version-locked.
        patterns:
          - "@types/*"
          - "@typescript-eslint/*"
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "@eslint/*"
    # Block major-version bumps for tools where the upstream change is too
    # disruptive to land via an automated PR. TS 6 (2026-04-27) tightened
    # the default `lib` set so DOM globals in src/browsing/captchaSolver.ts
    # stopped resolving — the bump produced ~30 typecheck errors. Pin major
    # for typescript + node @types and re-evaluate manually when upstream
    # type packages catch up.
    # Major-version ignore list. Every package here ships a breaking
    # migration that's too disruptive to land via an automated grouped
    # bump — auto-PRs landed those majors get reverted within minutes.
    # Patches + minors continue to flow through normally; majors land
    # by hand when the codebase is ready for the migration.
    #
    # History (all 2026-04-27):
    #   - typescript 5→6: tightened default `lib` config; broke ~30 DOM
    #     globals in src/browsing/captchaSolver.ts (PR #56).
    #   - zod 3→4: reshaped overload signatures used throughout
    #     src/config/schema.ts; ~30 TS2769 errors (PR #57).
    #   - eslint 8→10: requires the new flat config format
    #     (eslint.config.js); legacy .eslintrc no longer supported (PR #58).
    #   - @typescript-eslint 8→9: peer-dep on ESLint 9+ which we don't
    #     have yet — paired with the eslint pin above.
    #   - vitest 2→3+: workspace + reporter API churn; touches every
    #     test file's import surface.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "Djtony707"
    labels:
      - "ci"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    reviewers:
      - "Djtony707"
    labels:
      - "docker"
