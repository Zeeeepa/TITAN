version: '3.8'

services:
  # Neo4j Database for Graphiti Graph Storage
  neo4j:
    image: neo4j:5.23.0
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # Graphiti MCP Server (Standard IO wrapped in an SSE or REST endpoint, but MCP can run locally)
  # For TITAN, we'll run the Python Graphiti Server and use an SSE or Stdio interface.
  graphiti-mcp:
    image: ghcr.io/getzep/graphiti-mcp:latest
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      # OpenAI API key is needed by Graphiti for embedding and entity extraction
      # Please supply this in your host environment when running the container
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - neo4j
    # We expose the MCP server over SSE (Server-Sent Events) so TITAN can connect to it via HTTP
    # or expose its stdio if attaching directly via `docker run -i`
    ports:
      - "8000:8000"
    command: ["python", "-m", "uvicorn", "mcp_server.sse:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

volumes:
  neo4j_data:
